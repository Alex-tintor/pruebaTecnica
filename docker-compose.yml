services:
  mysql:
    image: mysql:8.4
    container_name: technical-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: technical_test
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - technical-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: technical-backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/technical_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    networks:
      - technical-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: technical-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - technical-network

volumes:
  mysql_data:

networks:
  technical-network:
    driver: bridge